name: Publish to npm

# Publishes to npm when you push a version tag, e.g.:
#   npm version patch        # bumps package.json + creates tag vX.Y.Z
#   git push --follow-tags
# The CDN (jsDelivr / unpkg) mirrors npm automatically — no extra step.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow a manual run from the Actions tab

permissions:
  contents: read
  id-token: write # required for npm provenance (supply-chain attestation)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      # Safety net: the pushed tag must match the package.json version.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Drop --provenance if the repo is private (provenance needs a public repo).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
